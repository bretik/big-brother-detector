name: Release extensions

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create, for example v0.0.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate release tag
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:RELEASE_TAG)) {
            throw "RELEASE_TAG is required."
          }

      - name: Build and package extensions
        shell: pwsh
        run: .\package.ps1 -OutputRoot artifacts -ReleaseLabel $env:RELEASE_TAG

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-packages-${{ env.RELEASE_TAG }}
          path: artifacts\*
          if-no-files-found: error

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            artifacts\*
