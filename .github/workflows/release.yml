name: Release extensions

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create, for example v0.0.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate release tag
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:RELEASE_TAG)) {
            throw "RELEASE_TAG is required."
          }

      - name: Validate Firefox signing secrets
        shell: pwsh
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:AMO_JWT_ISSUER) -or [string]::IsNullOrWhiteSpace($env:AMO_JWT_SECRET)) {
            throw "AMO_JWT_ISSUER and AMO_JWT_SECRET must be configured to create an installable Firefox release package."
          }

      - name: Install web-ext
        shell: pwsh
        run: npm install --global web-ext

      - name: Build and package extensions
        shell: pwsh
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: >
          .\package.ps1
          -OutputRoot artifacts
          -ReleaseLabel $env:RELEASE_TAG
          -AmoJwtIssuer $env:AMO_JWT_ISSUER
          -AmoJwtSecret $env:AMO_JWT_SECRET

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-packages-${{ env.RELEASE_TAG }}
          path: artifacts\*
          if-no-files-found: error

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            artifacts\big-brother-detector-chromium-${{ env.RELEASE_TAG }}.zip
            artifacts\big-brother-detector-firefox-${{ env.RELEASE_TAG }}.xpi
            artifacts\SHA256SUMS.txt
