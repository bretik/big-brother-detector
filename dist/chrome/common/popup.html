<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Big Brother Detector</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="panel">
      <div class="eyebrow">Big Brother Detector</div>
      <div class="hero">
        <div class="status-dot" id="status-dot"></div>
        <div>
          <h1 id="headline">Checking...</h1>
          <p id="hostname">Waiting for page data</p>
        </div>
      </div>
      <section class="card">
        <div class="label">Result</div>
        <div class="value" id="status-label">Unknown</div>
      </section>


      <section class="card muted" id="details-card">
        <div class="label">Certificate hints</div>
        <div class="details" id="details">No certificate details available.</div>
      </section>
      <section class="card" id="mode-card">
        <div class="label">Detection mode</div>
        <div class="mode-help" id="mode-summary">Loading mode settings...</div>
        <form id="mode-form">
          <label class="choice" id="choice-native">
            <input type="radio" name="mode" value="native_helper" />
            <span>
              <strong>Native helper</strong>
              <small>Recommended for Chrome without special startup flags.</small>
            </span>
          </label>
          <label class="choice" id="choice-flag">
            <input type="radio" name="mode" value="chrome_flag" />
            <span>
              <strong>Chrome flag</strong>
              <small>Use Chrome's `WebRequestSecurityInfo` developer flag.</small>
            </span>
          </label>
          <div class="actions">
            <button type="submit" id="save-button">Save mode</button>
          </div>
        </form>
        <div class="note" id="save-status"></div>
      </section>
      <section class="card muted" id="setup-card">
        <div class="label">Setup</div>
        <div class="details" id="setup-text">Loading setup instructions...</div>
      </section>
      <section class="card muted" id="diagnostics-card">
        <div class="label">Diagnostics</div>
        <div class="details prewrap" id="diagnostics-text">Loading diagnostics...</div>
      </section>
    </main>
    <script src="./status.js"></script>
    <script src="./popup.js"></script>
  </body>
</html>
